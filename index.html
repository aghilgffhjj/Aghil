<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>برنامه حسابداری</title>
<style>
body { font-family: Tahoma, sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; margin: 0; padding: 20px; }
.container { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; width: 100%; max-width: 450px; }
h1 { color: #1a73e8; font-size: 22px; margin-bottom: 20px; }
.input-group { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
input { padding: 12px; border: 1px solid #ddd; border-radius: 10px; font-family: Tahoma; font-size: 14px; outline: none; }
.btn { background-color: #1a73e8; color: white; border: none; padding: 12px; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 16px; width: 100%; }
.list-container { text-align: right; margin-top: 20px; border-top: 2px solid #eee; padding-top: 20px; }
.item { background: #f9f9f9; padding: 10px; border-bottom: 1px solid #ddd; display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 5px; border-radius: 5px; }
.total { font-weight: bold; color: #d93025; margin-top: 15px; font-size: 18px; text-align: center; }
</style>
</head>
<body>
<div class="container">
<h1>مدیریت هزینه‌ها 💰</h1>
<div class="input-group">
<input type="text" id="desc" placeholder="بابت چه چیزی؟">
<input type="number" id="amount" placeholder="مبلغ (تومان)">
<button class="btn" onclick="addItem()">ثبت هزینه ✅</button>
</div>
<div class="list-container">
<strong>لیست تراکنش‌ها:</strong>
<div id="list"></div>
<div class="total" id="total">مجموع: ۰ تومان</div>
</div>
</div>
<script>
let totalAmount = 0;
function addItem() {
const descInput = document.getElementById('desc');
const amountInput = document.getElementById('amount');
const desc = descInput.value;
const amount = amountInput.value;
if (desc === "" || amount === "") {
alert("لطفاً هر دو مورد را وارد کنید");
return;
}
const list = document.getElementById('list');
const itemDiv = document.createElement('div');
itemDiv.className = 'item';
itemDiv.innerHTML = '<span>' + desc + '</span> <span>' + parseInt(amount).toLocaleString() + ' تومان</span>';
list.appendChild(itemDiv);
totalAmount += parseInt(amount);
document.getElementById('total').innerText = "مجموع: " + totalAmount.toLocaleString() + " تومان";
descInput.value = "";
amountInput.value = "";
}
</script>
</body>
</html>
