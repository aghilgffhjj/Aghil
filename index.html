<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>پنل حسابداری</title>
<style>
body { font-family: Tahoma, sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
.container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; width: 85%; max-width: 400px; }
h1 { color: #1a73e8; margin-bottom: 20px; font-size: 24px; }
.status { color: #28a745; font-weight: bold; font-size: 1.2em; margin-bottom: 10px; }
p { color: #5f6368; line-height: 1.6; font-size: 14px; }
.btn { background-color: #1a73e8; color: white; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; text-decoration: none; display: inline-block; margin-top: 20px; width: 100%; font-weight: bold; }
</style>
</head>
<body>
<div class="container">
<h1>برنامه حسابداری</h1>
<div class="status">وضعیت سیستم: فعال ✅</div>
<p>به پنل مدیریت خوش آمدید. تمامی کدهای سرور شما با موفقیت بارگذاری شده و آماده استفاده هستند.</p>
<button class="btn">ورود به حساب کاربری</button>
</div>
</body>
</html>
